# 控制是否以及如何将依赖项添加到默认目录中
catalogMode: prefer

# 是否忽略向工作区根目录添加依赖时的警告提示
ignoreWorkspaceRootCheck: true

# npm 包注册表的基本 URL（包括尾部斜杠）
registry: https://registry.npmmirror.com

# 是否强制提升所有依赖
shamefullyHoist: true

# 在执行脚本时使用POSIX shell模拟器替代系统原生shell
shellEmulator: true

# 用于控制是否严格检查对等依赖（peer dependencies）的版本一致性。
# 当设置为 true 时，pnpm 会强制安装指定版本的对等依赖；
# 设置为 false 时，会忽略版本不一致的警告
strictPeerDependencies: false

# 当设置为“禁止降级”时，如果软件包的信任级别较之前的版本有所降低，pnpm 将无法安装
trustPolicy: no-downgrade

# 列出一个或多个 pnpm 应该允许安装的特定软件包或版本，即使这些软件包不满足信任策略要求。
trustPolicyExclude:
  - semver
  - chokidar
  - cached-factory

packages:
  - packages/*

catalogs:
  prod:
    '@lincy/utils': ^0.7.3
    axios: ^1.13.6
    baidu-aip-sdk: ^4.16.16
    base64-img: ^1.0.4
    cheerio: 1.0.0
    compression: ^1.8.1
    connect-multiparty: ^2.2.0
    cookie-parser: ^1.4.7
    dayjs: ^1.11.20
    express: ^5.2.1
    highlight.js: ^11.11.1
    jsonwebtoken: ^9.0.3
    lru-cache: ^11.2.7
    markdown-it: ^14.1.1
    markdown-it-toc-and-anchor: ^4.2.0
    md5: ^2.3.0
    mockjs: ^1.1.0
    mongoose: 8.7.3
    mongoose-autopopulate: ^1.2.1
    morgan: ^1.10.1
    multer: 1.4.5-lts.1
    qiniu: ^7.15.1
    request-ip: ^3.3.0
    serve-favicon: ^2.5.1
    tslib: ^2.8.1
    twig: ^2.0.0

  lint:
    '@lincy/eslint-config': ^6.5.2
    eslint: ^10.0.3
    lint-staged: ^16.4.0

  types:
    '@types/compression': ^1.8.1
    '@types/cookie-parser': ^1.4.10
    '@types/express': ^5.0.6
    '@types/jsonwebtoken': ^9.0.10
    '@types/markdown-it': ^14.1.2
    '@types/md5': ^2.3.6
    '@types/mockjs': ^1.0.10
    '@types/morgan': ^1.9.10
    '@types/multer': ^2.1.0
    '@types/node': ^25.5.0
    '@types/request-ip': ^0.0.41
    '@types/serve-favicon': ^2.5.7

  dev:
    concurrently: ^9.2.1
    jiti: ^2.6.1
    nodemon: ^3.1.14
    simple-git-hooks: ^2.13.1
    tsc-alias: ^1.8.16
    tsx: ^4.21.0
    typescript: ^5.9.3

onlyBuiltDependencies:
  - better-sqlite3
  - esbuild

peerDependencyRules:
  ignoreMissing:
    - prettier
